                return requestFromHost('hover', { line: position.lineNumber, column: position.column, buffer: model.getValue() })
                    .then(function (resp) {
                        if (!resp || !resp.contents) return null;
                        return { contents: [{ value: resp.contents }] };
                    })
                    .catch(function () { return null; });
            }
        });
    }

    // Basic Clarion syntax highlighting (Monarch). Keyword set is intentionally compact for M1.
    function registerClarionLanguage() {
        monaco.languages.setLanguageConfiguration('clarion', {
            comments: { lineComment: '!' },
            brackets: [['(', ')'], ['[', ']'], ['{', '}']],
            // Smart auto-indent on Enter (active when autoIndent='full'): indent the body of block
            // structures, outdent on END / lone '.' / CASE & IF sub-keywords. The negative lookahead
            // skips one-line forms that self-terminate with a trailing '.' (e.g. IF x THEN y.).
            indentationRules: {
                increaseIndentPattern: /^\s*(IF|LOOP|CASE|BEGIN|EXECUTE|GROUP|QUEUE|RECORD|FILE|VIEW|REPORT|WINDOW|APPLICATION|MENUBAR|MENU|TOOLBAR|SHEET|TAB|OPTION|CLASS|INTERFACE|MAP|MODULE|ITEMIZE|JOIN|OF|OROF|ELSE|ELSIF)\b(?![^!]*\.\s*$).*$/i,
                decreaseIndentPattern: /^\s*(END\b|\.\s*$|OF\b|OROF\b|ELSE\b|ELSIF\b|UNTIL\b|WHILE\b)/i
            }
        });
        monaco.languages.setMonarchTokensProvider('clarion', {
            ignoreCase: true,
            keywords: [
                'PROGRAM', 'MEMBER', 'MAP', 'MODULE', 'CLASS', 'INTERFACE', 'PROCEDURE', 'FUNCTION',
                'ROUTINE', 'CODE', 'DATA', 'END', 'RETURN', 'EXIT', 'IF', 'THEN', 'ELSE', 'ELSIF',
                'CASE', 'OF', 'OROF', 'LOOP', 'WHILE', 'UNTIL', 'BREAK', 'CYCLE', 'DO', 'BEGIN',
                'EXECUTE', 'GROUP', 'QUEUE', 'RECORD', 'FILE', 'VIEW', 'WINDOW', 'REPORT', 'MENU',
                'MENUBAR', 'TOOLBAR', 'SHEET', 'TAB', 'OPTION', 'APPLICATION', 'DETAIL', 'HEADER',
                'FOOTER', 'BREAK', 'FORM', 'SELF', 'PARENT', 'NEW', 'DISPOSE', 'THREAD', 'NULL',
                'TRUE', 'FALSE', 'AND', 'OR', 'XOR', 'NOT', 'CHOOSE', 'OMIT', 'COMPILE', 'INCLUDE',
                'EQUATE', 'ITEMIZE', 'TYPE', 'LIKE', 'DIM', 'OVER', 'NAME', 'PRE', 'STATIC', 'THREAD'
            ],
            types: [
                'LONG', 'ULONG', 'SHORT', 'USHORT', 'BYTE', 'SIGNED', 'UNSIGNED', 'REAL', 'SREAL',
                'DECIMAL', 'PDECIMAL', 'BFLOAT4', 'BFLOAT8', 'STRING', 'CSTRING', 'PSTRING', 'ASTRING',
                'MEMO', 'BLOB', 'DATE', 'TIME', 'BOOL', 'ANY', 'LONGLONG', 'BIGINT', 'GROUP', 'QUEUE'
            ],
            tokenizer: {
                root: [
                    [/!.*$/, 'comment'],
                    [/'(?:[^']|'')*'/, 'string'],
                    [/\b\d+(?:\.\d+)?\b/, 'number'],
                    [/\b[0-9A-Fa-f]+[Hh]\b/, 'number.hex'],
                    [/[A-Za-z_][A-Za-z0-9_]*:/, 'type.identifier'],
                    [/[A-Za-z_][A-Za-z0-9_]*/, {
                        cases: {
                            '@keywords': 'keyword',
                            '@types': 'type',
                            '@default': 'identifier'
                        }
                    }]
                ]
            }
        });
    }

    // ----- Editor settings (gear panel) -----
    // Settings arrive from the host on load (setSource) and on broadcast (applySettings, when another
    // tab changes them). Editing a control applies live AND posts to the host to persist + broadcast.
    function applyEditorSettings(s) {
        if (!editor || !s) return;
        var opts = {};
        if (typeof s.fontSize === 'number') opts.fontSize = s.fontSize;
        opts.wordWrap = s.wordWrap ? 'on' : 'off';
        opts.minimap = { enabled: !!s.minimap };
        opts.autoIndent = s.autoIndent ? 'full' : 'keep';
        editor.updateOptions(opts);
        if (editor2) editor2.updateOptions(opts);   // keep the split pane's editor-options in sync (#15)
        // tabSize / insertSpaces are MODEL options in Monaco, not editor options.
        var model = editor.getModel();
        if (model && typeof s.tabSize === 'number')
            model.updateOptions({ tabSize: s.tabSize, insertSpaces: !!s.insertSpaces });
        // Key-binding overrides (command id -> chord). Replace the live map and re-dispatch from it.
        if (s.keyBindings && typeof s.keyBindings === 'object') {
            keyBindings = sanitizeLoadedKeyBindings(s.keyBindings);
            rebuildChordMap();
            buildKeybindTable();   // reflect into the gear panel (no-op if it isn't built yet)
        }
        lastSettings = s;
    }

    // Validate a persisted/broadcast keyBindings map before trusting it. The live rebind UI rejects
    // conflicts, but a manually-edited or version-skewed settings.txt can carry unknown command ids or
    // two commands bound to the same chord — which would silently shadow a command (last-wins in the
    // dispatch map). Drop unknown ids; drop an override whose chord collides with another command's
    // EFFECTIVE chord, so the loser reverts to its (unique) default instead of vanishing. (Adversary finding.)
    function sanitizeLoadedKeyBindings(raw) {
        var byId = {};
        for (var i = 0; i < EDITOR_COMMANDS.length; i++) byId[EDITOR_COMMANDS[i].id] = EDITOR_COMMANDS[i];
        var clean = {};
        for (var k in raw) {
            if (!raw.hasOwnProperty(k) || !raw[k]) continue;
            if (!byId[k]) continue;                 // unknown command id (stale settings) — drop
            clean[k] = String(raw[k]);
        }
        // Resolve chord collisions across the resulting effective set (override or default per command),
        // dropping the offending OVERRIDE so that command falls back to its default.
        var seen = {};
        for (var j = 0; j < EDITOR_COMMANDS.length; j++) {
            var c = EDITOR_COMMANDS[j];
            if (c.deferred) continue;
            var chord = clean[c.id] || c.def;
            if (!chord) continue;
            if (seen[chord]) {
                if (clean[c.id]) { delete clean[c.id]; }   // this command's override collided — revert it
            } else {
                seen[chord] = c.id;
            }
        }
        return clean;
    }

    function populateSettingsPanel(s) {
        if (!s) return;
        var el;
        if ((el = document.getElementById('setTabSize')) && typeof s.tabSize === 'number') el.value = s.tabSize;
        if ((el = document.getElementById('setInsertSpaces'))) el.checked = !!s.insertSpaces;
        if ((el = document.getElementById('setAutoIndent'))) el.checked = !!s.autoIndent;
        if ((el = document.getElementById('setWordWrap'))) el.checked = !!s.wordWrap;
        if ((el = document.getElementById('setMinimap'))) el.checked = !!s.minimap;
        if ((el = document.getElementById('setFontSize')) && typeof s.fontSize === 'number') el.value = s.fontSize;
    }

    function readSettingsPanel() {
        function num(id, dflt, lo, hi) {
            var v = parseInt((document.getElementById(id) || {}).value, 10);
            if (isNaN(v)) return dflt;
            return Math.max(lo, Math.min(hi, v));
        }
        function chk(id) { var e = document.getElementById(id); return !!(e && e.checked); }
        return {
            tabSize: num('setTabSize', 2, 1, 16),
            insertSpaces: chk('setInsertSpaces'),
            autoIndent: chk('setAutoIndent'),
            wordWrap: chk('setWordWrap'),
            minimap: chk('setMinimap'),
            fontSize: num('setFontSize', 13, 6, 48)
        };
    }

    // Full settings payload (editor options + key-binding overrides) for persist + cross-tab broadcast.
    function buildSettingsPayload() {
        var s = readSettingsPanel();
        s.keyBindings = {};
        for (var id in keyBindings) if (keyBindings.hasOwnProperty(id)) s.keyBindings[id] = keyBindings[id];
        return s;
    }

    function persistSettings() {
        postToHost({ action: 'saveSettings', settings: buildSettingsPayload() }); // persist + broadcast to other tabs
    }

    function onSettingChanged() {
        var s = buildSettingsPayload();
        applyEditorSettings(s);
        postToHost({ action: 'saveSettings', settings: s });
    }

    // ----- Keyboard rebinding table (gear panel) -----
    function buildKeybindTable() {
        var tb = document.getElementById('keybindRows');
        if (!tb) return;
        tb.innerHTML = '';
        for (var i = 0; i < EDITOR_COMMANDS.length; i++) {
            var c = EDITOR_COMMANDS[i];
            var override = keyBindings[c.id];
            var eff = override || c.def;
            var tr = document.createElement('tr');
            if (c.deferred) tr.className = 'kb-deferred';
            tr.innerHTML =
                '<td>' + escHtml(c.label) + '</td>' +
                '<td class="kb-def">' + escHtml(c.def || '—') + '</td>' +
                '<td><input class="kb-input" data-cmd="' + escHtml(c.id) + '" readonly' +
                    (c.deferred ? ' disabled' : '') + (override ? ' data-custom="1"' : '') +
                    ' value="' + escHtml(eff || '') + '"></td>' +
                '<td>' + (c.deferred ? '' : '<span class="kb-clear" data-cmd="' + escHtml(c.id) + '" title="Reset to default">&#8635;</span>') + '</td>';
            tb.appendChild(tr);
        }
        wireKeybindRows();
    }

    function wireKeybindRows() {
        var inputs = document.querySelectorAll('#keybindRows .kb-input');
        for (var i = 0; i < inputs.length; i++) {
            inputs[i].addEventListener('click', function () { startKeyCapture(this); });
            inputs[i].addEventListener('blur', function () { if (captureInput === this) cancelKeyCapture(); });
        }
        var clears = document.querySelectorAll('#keybindRows .kb-clear');
        for (var j = 0; j < clears.length; j++) {
            clears[j].addEventListener('click', function () {
                var id = this.getAttribute('data-cmd');
                if (keyBindings[id] !== undefined) {
                    delete keyBindings[id];
                    rebuildChordMap();
                    buildKeybindTable();
                    persistSettings();
                }
            });
        }
    }

    function startKeyCapture(input) {
        if (input.disabled) return;
        cancelKeyCapture();                 // only one armed input at a time
        captureInput = input;
        capturingKey = true;
        input.classList.add('capturing');
        input.value = 'press keys…';
        input.focus();
    }

    function cancelKeyCapture() {
        if (!captureInput) { capturingKey = false; return; }
        captureInput.classList.remove('capturing');
        capturingKey = false;
        captureInput = null;
        buildKeybindTable();                // restore the displayed value
    }

    // Called from the global capture-phase dispatcher while capturingKey is true. Records the pressed
    // chord onto the armed command, rejecting conflicts with another command's effective chord.
    function handleKeyCapture(ev) {
        ev.preventDefault();
        ev.stopImmediatePropagation();
        if (ev.key === 'Escape') { cancelKeyCapture(); return; }
        var chord = chordFromEvent(ev);
        if (!chord) return;                 // pure modifier — keep waiting for the real key
        if (!captureInput) { capturingKey = false; return; }
        var id = captureInput.getAttribute('data-cmd');
        for (var i = 0; i < EDITOR_COMMANDS.length; i++) {
            var c = EDITOR_COMMANDS[i];
            if (c.id !== id && !c.deferred && effectiveChord(c) === chord) {
                showToast('“' + chord + '” is already bound to ' + c.label, false);
                return;                     // stay armed so the dev can pick another
            }
        }
        if (chord === defOf(id)) delete keyBindings[id]; else keyBindings[id] = chord;
        // Tear down capture WITHOUT rebuilding yet (cancel would clobber state), then commit.
        if (captureInput) captureInput.classList.remove('capturing');
        capturingKey = false;
        captureInput = null;
        rebuildChordMap();
        buildKeybindTable();
        persistSettings();
    }

    function wireSettingsPanel() {
        var btn = document.getElementById('settingsBtn');
        if (btn) btn.addEventListener('click', function () {
            var p = document.getElementById('settingsPanel');
            if (p) p.classList.toggle('hidden');
        });
        var ids = ['setTabSize', 'setInsertSpaces', 'setAutoIndent', 'setWordWrap', 'setMinimap', 'setFontSize'];
        for (var i = 0; i < ids.length; i++) {
            var e = document.getElementById(ids[i]);
            if (e) e.addEventListener('change', onSettingChanged);
        }
        var resetAll = document.getElementById('kbResetAll');
        if (resetAll) resetAll.addEventListener('click', function () {
            keyBindings = {};
            rebuildChordMap();
            buildKeybindTable();
            persistSettings();
        });
        buildKeybindTable();
        // Close the panel on Escape for a tidy keyboard flow (but not while capturing a key — Esc there
        // cancels the capture, handled by the dispatcher, so don't also close the panel).
        document.addEventListener('keydown', function (ev) {
            if (ev.key === 'Escape' && !capturingKey) {
                var p = document.getElementById('settingsPanel');
                if (p && !p.classList.contains('hidden')) p.classList.add('hidden');
            }
        });
    }

    // ===================== Embed-slot navigation (toolbar Prev/Next [Filled] Embed) =====================
    // The Modern Embeditor's "embeds" are the editable slots (embedRanges). These mirror the native
    // embeditor's Prev/Next Embed and Prev/Next Filled Embed buttons. A "filled" slot has at least one
    // non-blank line. Navigation lands on the first non-whitespace column of the slot's first line and
    // wraps around the ends.
    function slotIsFilled(slot) {
        var model = editor.getModel();
        for (var ln = slot[0]; ln <= slot[1]; ln++)
            if (model.getLineContent(ln).trim().length) return true;
        return false;
    }

    function embedStarts(filledOnly) {
        var slots = (embedRanges || []).slice().sort(function (a, b) { return a[0] - b[0]; });
        var starts = [];
        for (var i = 0; i < slots.length; i++)
            if (!filledOnly || slotIsFilled(slots[i])) starts.push(slots[i][0]);
        return starts;
    }

    function navEmbed(dir, filledOnly) {
        if (!editor) return;
        var ed = activeEd();   // operate on the focused split pane, not always the primary (#15)
        var starts = embedStarts(filledOnly);
        if (!starts.length) { showToast(filledOnly ? 'No filled embed slots' : 'No embed slots', false); return; }
        var cur = ed.getPosition().lineNumber;
        var target = null, i;
        if (dir > 0) {
            for (i = 0; i < starts.length; i++) if (starts[i] > cur) { target = starts[i]; break; }
            if (target === null) target = starts[0];                     // wrap to first
        } else {
            for (i = starts.length - 1; i >= 0; i--) if (starts[i] < cur) { target = starts[i]; break; }
            if (target === null) target = starts[starts.length - 1];     // wrap to last
        }
        var col = ed.getModel().getLineFirstNonWhitespaceColumn(target) || 1;
        ed.revealLineInCenter(target);
        ed.setPosition({ lineNumber: target, column: col });
        ed.focus();
    }

    // ===================== Find & Replace (Clarion-style results panel) =====================
    // Entirely client-side Monaco: model.findMatches() locates every occurrence; the results grid
    // lists each matching line (click = reveal + select in the editor); Replace operates ONLY inside
    // editable embed slots — read-only/generated matches are shown with a lock and never replaced.
    // The "Include read-only blocks" toggle controls whether those generated matches appear at all.

    function escHtml(s) {
        // Escapes BOTH element-text and attribute contexts (quotes included) — buildKeybindTable renders
        // persisted, attacker-influenceable chords into value="..." attributes, so unescaped quotes would
        // be a stored-XSS breakout in the trusted WebView. (Security gate finding.)
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function setEditorBottom(px) {
        var ed = document.getElementById('editor');
        if (ed) ed.style.bottom = px + 'px';   // automaticLayout picks up the resize
        var e2 = document.getElementById('editor2');   // keep the split pane clear of the Find panel too
        if (e2) e2.style.bottom = px + 'px';
    }

    // Monaco binds Ctrl+F / Ctrl+H to its built-in find/replace widgets at a keybinding weight that
    // editor.addCommand does NOT override. Intercept in the capture phase (before the event reaches
    // Monaco's textarea handler) and stop it dead, so OUR panel opens instead. F3/Shift+F3 cycle.
    function installFindKeyInterceptor() {
        document.addEventListener('keydown', function (ev) {
            if (capturingKey) return;   // rebind-capture in the settings panel owns the keyboard
            var ctrl = ev.ctrlKey || ev.metaKey;
            if (ctrl && (ev.keyCode === 70 || ev.key === 'f' || ev.key === 'F')) {         // Ctrl+F
                ev.preventDefault(); ev.stopImmediatePropagation(); openFindPanel(false);
            } else if (ctrl && (ev.keyCode === 72 || ev.key === 'h' || ev.key === 'H')) {   // Ctrl+H
                ev.preventDefault(); ev.stopImmediatePropagation(); openFindPanel(true);
            } else if (ev.keyCode === 114 || ev.key === 'F3') {                             // F3 / Shift+F3
                ev.preventDefault(); ev.stopImmediatePropagation(); gotoMatch(ev.shiftKey ? -1 : 1);
            }
        }, true);   // capture phase — runs ahead of Monaco's own keydown listener
    }

    // Single-line non-empty editor selection text, else '' (used to seed a search from Ctrl+F).
    function selectionWord() {
        var sel = editor && editor.getSelection();
        if (sel && !sel.isEmpty()) {
            var t = editor.getModel().getValueInRange(sel);
            if (t.indexOf('\n') < 0) return t;
        }
        return '';
    }

    function openFindPanel(focusReplace) {
        var panel = document.getElementById('findPanel');
        if (!panel) return;
        var wasHidden = panel.classList.contains('hidden');
        panel.classList.remove('hidden');
        setEditorBottom(panel.offsetHeight);
        if (!findTabs.length) createTab(null);   // always have at least one tab

        var input = document.getElementById('findInput');
        var sel = selectionWord();
        if (sel) {
            var existing = tabIndexByQuery(sel);
            if (existing >= 0) {                          // a tab already searches this word → activate it
                if (existing !== activeTab) { saveActiveTab(); loadTab(existing); }
                input.value = sel; runFind();
            } else if (!input.value && !findResults.length) {
                input.value = sel; runFind();             // reuse the current blank/unused tab
            } else {
                createTab(sel);                           // open a NEW tab for the new word
            }
        } else if (wasHidden && input.value) {
            runFind();                                    // reopening with no selection → refresh active tab
        }

        var focusEl = focusReplace ? document.getElementById('replInput') : input;
        focusEl.focus(); focusEl.select();
    }

    function closeFindPanel() {
        var panel = document.getElementById('findPanel');
        if (!panel) return;
        saveActiveTab();                  // persist the active tab's query/replace/opts for reopen
        panel.classList.add('hidden');
        setEditorBottom(0);
        clearFindHighlights();
        hideHist('findHist'); hideHist('replHist'); hideTabMenu();
        if (editor) editor.focus();
    }

    function clearFindHighlights() {
        if (editor) findDecorations = editor.getModel().deltaDecorations(findDecorations, []);   // model-level (both panes)
    }

    // ---- Core search ----
    function runFind() {
        if (!editor) return;
        var q = document.getElementById('findInput').value;
        var countEl = document.getElementById('findCount');
        if (!q) {
            findResults = []; lastFindQuery = null; findCurrentIdx = -1;
            renderResults(); clearFindHighlights(); countEl.textContent = '';
            if (activeTab >= 0 && findTabs[activeTab]) { findTabs[activeTab].query = ''; refreshTabLabels(); }
            return;
        }
        var model = editor.getModel();
        var wordSep = findOpts.wholeWord ? WORD_SEPARATORS : null;
        var raw;
        try {
            raw = model.findMatches(q, false, findOpts.regex, findOpts.matchCase, wordSep, true);
        } catch (ex) {
            countEl.textContent = 'Invalid regex';
            findResults = []; findCurrentIdx = -1; renderResults(); clearFindHighlights();
            return;
        }
        findResults = [];
        for (var i = 0; i < raw.length; i++) {
            var rg = raw[i].range;
            var editable = isEditableRange(rg);
            if (!editable && !findOpts.includeReadOnly) continue;
            findResults.push({
                line: rg.startLineNumber, startCol: rg.startColumn,
                endLine: rg.endLineNumber, endCol: rg.endColumn,
                text: model.getLineContent(rg.startLineNumber),
                editable: editable, checked: editable,   // editable rows checked by default for replace
                matches: raw[i].matches || null
            });
        }
        lastFindQuery = q;
        findCurrentIdx = findResults.length ? 0 : -1;
        addHistory(findHistory, q); addHistory(procFindHistory, q, 10); persistHistory();
        renderResults();
        paintHighlights();
        var lines = countLines(findResults);
        var ro = findResults.filter(function (r) { return !r.editable; }).length;
        countEl.textContent = findResults.length
            ? (findResults.length + ' match' + (findResults.length === 1 ? '' : 'es') +
               ' · ' + lines + ' line' + (lines === 1 ? '' : 's') + (ro ? ' · ' + ro + ' read-only' : ''))
            : 'No matches';
        if (activeTab >= 0 && findTabs[activeTab]) { findTabs[activeTab].query = q; refreshTabLabels(); }
        if (findResults.length) revealMatch(0, false);
    }

    function countLines(arr) {
        var seen = {}, n = 0;
        for (var i = 0; i < arr.length; i++) if (!seen[arr[i].line]) { seen[arr[i].line] = 1; n++; }
        return n;
    }

    function paintHighlights() {
        if (!editor) return;
        var decos = findResults.map(function (r, i) {
            return {
                range: new monaco.Range(r.line, r.startCol, r.endLine, r.endCol),
                options: { className: (i === findCurrentIdx ? 'find-match-current' : 'find-match') }
            };
        });
        findDecorations = editor.getModel().deltaDecorations(findDecorations, decos);   // model-level (both panes)
    }

    // ---- Results grid ----
    function renderResults() {
        var tb = document.getElementById('findResults');
        var empty = document.getElementById('findEmpty');
        tb.innerHTML = '';
        if (!findResults.length) { empty.style.display = ''; return; }
        empty.style.display = 'none';
        for (var i = 0; i < findResults.length; i++) {
            var r = findResults[i];
            var tr = document.createElement('tr');
            tr.className = (i === findCurrentIdx ? 'active' : '');
            tr.setAttribute('data-idx', i);
            var tdChk = document.createElement('td'); tdChk.className = 'c-chk';
            var cb = document.createElement('input'); cb.type = 'checkbox';
            cb.checked = r.checked; cb.disabled = !r.editable; cb.setAttribute('data-idx', i);
            cb.addEventListener('click', function (ev) { ev.stopPropagation(); });
            cb.addEventListener('change', function (ev) {
                findResults[+ev.target.getAttribute('data-idx')].checked = ev.target.checked;
            });
            tdChk.appendChild(cb);
            var tdLine = document.createElement('td'); tdLine.className = 'c-line'; tdLine.textContent = r.line;
            var tdLock = document.createElement('td'); tdLock.className = 'c-lock';
            if (!r.editable) { tdLock.textContent = '🔒'; tdLock.title = 'Read-only (generated) — not replaceable'; }
            var tdCode = document.createElement('td');
            tdCode.innerHTML = highlightLine(r.text, r.startCol, r.endCol, r.line, r.endLine);
            tr.appendChild(tdChk); tr.appendChild(tdLine); tr.appendChild(tdLock); tr.appendChild(tdCode);
            tr.addEventListener('click', function (ev) { revealMatch(+ev.currentTarget.getAttribute('data-idx'), true); });
            tb.appendChild(tr);
        }
    }

    // Highlight the matched substring within the displayed line. Single-line matches use exact columns;
    // a multi-line (regex) match just highlights from startCol to end of the first line.
    function highlightLine(text, startCol, endCol, line, endLine) {
        var s = startCol - 1;
        var e = (endLine === line) ? endCol - 1 : text.length;
        if (s < 0) s = 0;
        if (e > text.length) e = text.length;
        if (e < s) e = s;
        return escHtml(text.slice(0, s)) +
            '<span class="hl">' + escHtml(text.slice(s, e)) + '</span>' +
            escHtml(text.slice(e));
    }

    function revealMatch(idx, focusEditor) {
        if (idx < 0 || idx >= findResults.length) return;
        findCurrentIdx = idx;
        var r = findResults[idx];
        var range = new monaco.Range(r.line, r.startCol, r.endLine, r.endCol);
        editor.revealRangeInCenter(range);
        editor.setSelection(range);
        paintHighlights();
        var rows = document.querySelectorAll('#findResults tr');
        for (var i = 0; i < rows.length; i++) rows[i].className = (i === idx ? 'active' : '');
        if (rows[idx] && rows[idx].scrollIntoView) rows[idx].scrollIntoView({ block: 'nearest' });
        if (focusEditor) editor.focus();
    }

    // F3 / Shift+F3 cycle through matches (wraps).
    function gotoMatch(dir) {
        if (!findResults.length) {
            if (document.getElementById('findInput').value) runFind();
            return;
        }
        var idx = findCurrentIdx + dir;
        if (idx < 0) idx = findResults.length - 1;
        if (idx >= findResults.length) idx = 0;
        revealMatch(idx, true);
    }

    // ---- Replace (editable slots only) ----
    function doReplace(onlyChecked) {
        if (!editor || !findResults.length) return;
        var replText = document.getElementById('replInput').value;
        var edits = [], replaced = 0, skippedRo = 0;
        for (var i = 0; i < findResults.length; i++) {
            var r = findResults[i];
            if (!r.editable) { skippedRo++; continue; }        // never touch read-only/generated code
            if (onlyChecked && !r.checked) continue;
            var range = new monaco.Range(r.line, r.startCol, r.endLine, r.endCol);
            edits.push({ range: range, text: findOpts.regex ? expandRepl(replText, r.matches) : replText });
            replaced++;
        }
        if (!replaced) { showToast('No editable matches to replace', false); return; }
        // One atomic edit — Monaco adjusts the non-overlapping ranges itself. The read-only guard sees
        // these as edits inside editable slots, allows them, and keeps embedRanges in sync.
        editor.executeEdits('find-replace', edits);
        if (replText) { addHistory(replHistory, replText); persistHistory(); }
        showToast('Replaced ' + replaced + ' match' + (replaced === 1 ? '' : 'es') +
            (skippedRo ? ' (' + skippedRo + ' read-only skipped)' : ''), true);
        runFind();   // refresh the grid against the new buffer
    }

    // Expand $0..$9 / $& / $$ back-references in a regex replacement using a Monaco capture array.
    function expandRepl(tmpl, groups) {
        if (!groups) return tmpl;
        return tmpl.replace(/\$(\$|&|\d)/g, function (m, g) {
            if (g === '$') return '$';
            if (g === '&') return groups[0] || '';
            var n = parseInt(g, 10);
            return (groups[n] != null) ? groups[n] : '';
        });
    }

    // ---- History dropdowns ----
    function addHistory(arr, val, cap) {
        if (!val) return;
        cap = cap || 25;
        for (var i = arr.length - 1; i >= 0; i--) if (arr[i] === val) arr.splice(i, 1);
        arr.unshift(val);
        if (arr.length > cap) arr.length = cap;
    }

    // Replace an array's contents in place (keeps the same object reference the closures captured).
    function replaceArray(arr, src) {
        arr.length = 0;
        for (var i = 0; i < src.length; i++) arr.push(src[i]);
    }

    // Persist Find/Replace history to the host (%APPDATA%), debounced. The host stores it authoritatively
    // and broadcasts the saved lists back (applyHistory) so all open tabs converge.
    var _histSaveTimer = null;
    function persistHistory() {
        if (_histSaveTimer) clearTimeout(_histSaveTimer);
        _histSaveTimer = setTimeout(function () {
            postToHost({ action: 'saveHistory', find: findHistory, replace: replHistory, proc: procFindHistory });
        }, 400);
    }

    // One clickable history row. onDelete(term) removes it from the backing store(s) then re-renders.
    function appendHistItem(box, term, inputId, onDelete) {
        var row = document.createElement('div');
        var label = document.createElement('span'); label.textContent = term;
        var x = document.createElement('span'); x.className = 'hx'; x.textContent = '✕';
        x.title = 'Remove from history';
        row.appendChild(label); row.appendChild(x);
        row.addEventListener('click', function (ev) {
            if (ev.target === x) { ev.stopPropagation(); onDelete(term); return; }
            document.getElementById(inputId).value = term;
            hideHist(inputId === 'findInput' ? 'findHist' : 'replHist');
            if (inputId === 'findInput') runFind();   // picking a search term searches immediately
            else document.getElementById('replInput').focus();
        });
        box.appendChild(row);
    }

    function appendHistHeader(box, text) {
        var h = document.createElement('div');
        h.className = 'hist-header'; h.textContent = text;
        box.appendChild(h);
    }

    function appendHistEmpty(box) {
        var none = document.createElement('div'); none.className = 'hist-empty';
        none.textContent = '(no history)'; box.appendChild(none);
    }

    // Replace-history dropdown — single solution-wide list.
    function showReplHist() {
        var box = document.getElementById('replHist');
        box.innerHTML = '';
        if (!replHistory.length) appendHistEmpty(box);
        else replHistory.forEach(function (term) {
            appendHistItem(box, term, 'replInput', function (t) {
                var k = replHistory.indexOf(t); if (k >= 0) replHistory.splice(k, 1);
                showReplHist(); persistHistory();
            });
        });
        box.classList.remove('hidden');
    }

    // Find-history dropdown — LAYERED: "This procedure" group (procFindHistory) on top, then the full
    // solution-wide list (findHistory minus the proc duplicates). Deleting forgets a term everywhere.
    function showFindHist() {
        var box = document.getElementById('findHist');
        box.innerHTML = '';
        function delEverywhere(t) {
            var k = procFindHistory.indexOf(t); if (k >= 0) procFindHistory.splice(k, 1);
            var j = findHistory.indexOf(t); if (j >= 0) findHistory.splice(j, 1);
            showFindHist(); persistHistory();
        }
        var hasProc = procFindHistory.length > 0;
        if (hasProc) {
            appendHistHeader(box, 'This procedure');
            procFindHistory.forEach(function (term) { appendHistItem(box, term, 'findInput', delEverywhere); });
        }
        var solOnly = findHistory.filter(function (t) { return procFindHistory.indexOf(t) < 0; });
        if (solOnly.length) {
            if (hasProc) appendHistHeader(box, 'Solution');
            solOnly.forEach(function (term) { appendHistItem(box, term, 'findInput', delEverywhere); });
        }
        if (!hasProc && !solOnly.length) appendHistEmpty(box);
        box.classList.remove('hidden');
    }

    function hideHist(histId) {
        var box = document.getElementById(histId);
        if (box) box.classList.add('hidden');
    }

    function setToggle(id, on) {
        var el = document.getElementById(id);
        if (el) el.classList.toggle('on', on);
    }

    // ---- Grip resize ----
    function startGripDrag(ev) {
        ev.preventDefault();
        var panel = document.getElementById('findPanel');
        var startY = ev.clientY, startH = panel.offsetHeight;
        function move(e) {
            var h = Math.max(150, Math.min(window.innerHeight * 0.75, startH + (startY - e.clientY)));
            panel.style.height = h + 'px';
            setEditorBottom(h);
        }
        function up() {
            document.removeEventListener('mousemove', move);
            document.removeEventListener('mouseup', up);
        }
        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', up);
    }

    function setAllChecked(on) {
        for (var i = 0; i < findResults.length; i++)
            if (findResults[i].editable) findResults[i].checked = on;
        var cbs = document.querySelectorAll('#findResults input[type=checkbox]');
        for (var j = 0; j < cbs.length; j++) if (!cbs[j].disabled) cbs[j].checked = on;
    }

    function copyResults() {
        var rows = findResults.filter(function (r) { return r.checked; });
        if (!rows.length) rows = findResults;   // nothing checked → copy them all
        var text = rows.map(function (r) { return r.line + ': ' + r.text; }).join('\r\n');
        if (!text) return;
        postToHost({ action: 'clipboard', text: text });
        showToast('Copied ' + rows.length + ' line' + (rows.length === 1 ? '' : 's'), true);
    }

    // ---- Find tabs ----
    function cloneOpts(o) {
        return { matchCase: o.matchCase, wholeWord: o.wholeWord, regex: o.regex, includeReadOnly: o.includeReadOnly };
    }

    function blankSession() {
        return {
            id: ++tabSeq, query: '', replaceText: '',
            opts: { matchCase: false, wholeWord: false, regex: false, includeReadOnly: true }
        };
    }

    function tabIndexByQuery(q) {
        for (var i = 0; i < findTabs.length; i++) if (findTabs[i].query === q) return i;
        return -1;
    }

    // Persist the live working state (inputs + toggles) into the active session. Results are NOT stored
    // — they're re-derived on load so every tab reflects the current buffer.
    function saveActiveTab() {
        if (activeTab < 0 || !findTabs[activeTab]) return;
        var s = findTabs[activeTab];
        s.query = document.getElementById('findInput').value;
        s.replaceText = document.getElementById('replInput').value;
        s.opts = cloneOpts(findOpts);
    }

    // Make tab i active: restore its inputs/toggles into the live globals, then re-run its search fresh.
    function loadTab(i) {
        if (i < 0 || i >= findTabs.length) return;
        activeTab = i;
        var s = findTabs[i];
        document.getElementById('findInput').value = s.query;
        document.getElementById('replInput').value = s.replaceText;
        findOpts = cloneOpts(s.opts);
        setToggle('tgCase', findOpts.matchCase); setToggle('tgWord', findOpts.wholeWord);
        setToggle('tgRegex', findOpts.regex); setToggle('tgRo', findOpts.includeReadOnly);
        if (s.query) {
            runFind();   // rebuilds results/highlights/count against the live buffer
        } else {
            findResults = []; findCurrentIdx = -1; lastFindQuery = null;
            renderResults(); clearFindHighlights();
            document.getElementById('findCount').textContent = '';
        }
        renderTabs();
    }

    // Create a new tab (optionally seeded with a query) and make it active.
    function createTab(seedQuery) {
        if (activeTab >= 0) saveActiveTab();
        var s = blankSession();
        if (activeTab >= 0 && findTabs[activeTab]) s.opts = cloneOpts(findTabs[activeTab].opts); // carry toggles
        findTabs.push(s);
        loadTab(findTabs.length - 1);
        if (seedQuery) { document.getElementById('findInput').value = seedQuery; runFind(); }
    }

    function closeTab(i) {
        if (i < 0 || i >= findTabs.length) return;
        var wasActive = (i === activeTab);
        findTabs.splice(i, 1);
        if (!findTabs.length) { activeTab = -1; createTab(null); return; }   // never zero tabs
        if (wasActive) { activeTab = -1; loadTab(Math.min(i, findTabs.length - 1)); }
        else { if (activeTab > i) activeTab--; renderTabs(); }
    }

    function closeOthers(i) {
        if (i < 0 || i >= findTabs.length) return;
        var keep = findTabs[i];
        findTabs = [keep]; activeTab = -1; loadTab(0);
    }

    function closeRight(i) {
        if (i < 0 || i >= findTabs.length - 1) return;
        findTabs.splice(i + 1);
        if (activeTab > i) { activeTab = -1; loadTab(i); } else renderTabs();
    }

    function closeAllTabs() { findTabs = []; activeTab = -1; createTab(null); }

    // Light label refresh (no listener rebuild) — called after each search.
    function refreshTabLabels() {
        var tabs = document.getElementById('findTabs').getElementsByClassName('ftab');
        for (var i = 0; i < tabs.length && i < findTabs.length; i++) {
            var lbl = tabs[i].getElementsByClassName('ftab-label')[0];
            var q = findTabs[i].query || 'untitled';
            if (lbl) lbl.textContent = q;
            tabs[i].title = q;
            tabs[i].className = 'ftab' + (i === activeTab ? ' active' : '');
        }
    }

    function renderTabs() {
        var strip = document.getElementById('findTabs');
        if (!strip) return;
        strip.innerHTML = '';
        findTabs.forEach(function (s, idx) {
            var tab = document.createElement('div');
            tab.className = 'ftab' + (idx === activeTab ? ' active' : '');
            tab.title = s.query || 'untitled';
            var label = document.createElement('span');
            label.className = 'ftab-label'; label.textContent = s.query || 'untitled';
            var x = document.createElement('span');
            x.className = 'ftab-x'; x.textContent = '✕'; x.title = 'Close tab';
            tab.appendChild(label); tab.appendChild(x);
            tab.addEventListener('click', function (ev) {
                if (ev.target === x) { ev.stopPropagation(); closeTab(idx); return; }
                if (idx !== activeTab) { saveActiveTab(); loadTab(idx); document.getElementById('findInput').focus(); }
            });
            tab.addEventListener('contextmenu', function (ev) {
                ev.preventDefault(); showTabMenu(ev.clientX, ev.clientY, idx);
            });
            strip.appendChild(tab);
        });
        var add = document.createElement('div');
        add.className = 'ftab-add'; add.textContent = '+'; add.title = 'New find tab';
        add.addEventListener('click', function () { createTab(null); document.getElementById('findInput').focus(); });
        strip.appendChild(add);
    }

    function showTabMenu(x, y, idx) {
        var menu = document.getElementById('ftabMenu');
        if (!menu) return;
        menu.innerHTML = '';
        var multi = findTabs.length > 1;
        var hasRight = idx < findTabs.length - 1;
        var items = [
            ['Close tab', true, function () { closeTab(idx); }],
            ['Close other tabs', multi, function () { closeOthers(idx); }],
            ['Close tabs to the right', hasRight, function () { closeRight(idx); }],
            ['Close all tabs', true, function () { closeAllTabs(); }]
        ];
        items.forEach(function (it) {
            var d = document.createElement('div');
            d.className = 'ftab-menu-item' + (it[1] ? '' : ' disabled');
            d.textContent = it[0];
            if (it[1]) d.addEventListener('click', function () { hideTabMenu(); it[2](); });
            menu.appendChild(d);
        });
        // keep the menu on-screen
        menu.style.left = Math.min(x, window.innerWidth - 190) + 'px';
        menu.style.top = Math.min(y, window.innerHeight - 130) + 'px';
        menu.classList.remove('hidden');
    }

    function hideTabMenu() {
        var m = document.getElementById('ftabMenu');
        if (m) m.classList.add('hidden');
    }

    // ---- Wiring ----
    function wireFindPanel() {
        // Toolbar buttons: Find & Replace + theme toggle + embed-slot navigation.
        document.getElementById('findBtn').addEventListener('click', function () { openFindPanel(false); });
        document.getElementById('themeBtn').addEventListener('click', toggleTheme);
        document.getElementById('prevEmbedBtn').addEventListener('click', function () { navEmbed(-1, false); });
        document.getElementById('nextEmbedBtn').addEventListener('click', function () { navEmbed(1, false); });
        document.getElementById('prevFilledBtn').addEventListener('click', function () { navEmbed(-1, true); });
        document.getElementById('nextFilledBtn').addEventListener('click', function () { navEmbed(1, true); });

        var fi = document.getElementById('findInput');
        document.getElementById('findGo').addEventListener('click', runFind);
        fi.addEventListener('keydown', function (ev) {
            if (ev.key === 'Enter') {
                ev.preventDefault();
                if (ev.target.value === lastFindQuery && findResults.length) gotoMatch(ev.shiftKey ? -1 : 1);
                else runFind();
            } else if (ev.key === 'Escape') { ev.preventDefault(); closeFindPanel(); }
        });
        document.getElementById('replInput').addEventListener('keydown', function (ev) {
            if (ev.key === 'Enter') { ev.preventDefault(); doReplace(true); }
            else if (ev.key === 'Escape') { ev.preventDefault(); closeFindPanel(); }
        });
        document.getElementById('findClose').addEventListener('click', closeFindPanel);

        function tg(id, key) {
            document.getElementById(id).addEventListener('click', function () {
                findOpts[key] = !findOpts[key];
                setToggle(id, findOpts[key]);
                if (document.getElementById('findInput').value) runFind();
            });
        }
        tg('tgCase', 'matchCase'); tg('tgWord', 'wholeWord');
        tg('tgRegex', 'regex'); tg('tgRo', 'includeReadOnly');

        document.getElementById('findCaret').addEventListener('click', function (ev) {
            ev.stopPropagation();
            var box = document.getElementById('findHist');
            if (box.classList.contains('hidden')) showFindHist(); else hideHist('findHist');
        });
        document.getElementById('replCaret').addEventListener('click', function (ev) {
            ev.stopPropagation();
            var box = document.getElementById('replHist');
            if (box.classList.contains('hidden')) showReplHist(); else hideHist('replHist');
        });
        document.getElementById('findHistClear').addEventListener('click', function () {
            findHistory.length = 0; procFindHistory.length = 0; hideHist('findHist'); persistHistory(); showToast('Search history cleared', true);
        });
        document.getElementById('replHistClear').addEventListener('click', function () {
            replHistory.length = 0; hideHist('replHist'); persistHistory(); showToast('Replace history cleared', true);
        });

        document.getElementById('replSel').addEventListener('click', function () { doReplace(true); });
        document.getElementById('replAll').addEventListener('click', function () { doReplace(false); });

        document.getElementById('selAll').addEventListener('click', function () { setAllChecked(true); });
        document.getElementById('selNone').addEventListener('click', function () { setAllChecked(false); });
        document.getElementById('copyRes').addEventListener('click', copyResults);
        document.getElementById('clearRes').addEventListener('click', function () {
            findResults = []; findCurrentIdx = -1; lastFindQuery = null;
            renderResults(); clearFindHighlights(); document.getElementById('findCount').textContent = '';
        });

        document.getElementById('findGrip').addEventListener('mousedown', startGripDrag);

        // Ctrl+mousewheel over the Find pane changes its font size (mirrors the editor's Ctrl+wheel zoom).
        document.getElementById('findPanel').addEventListener('wheel', function (ev) {
            if (!ev.ctrlKey) return;
            ev.preventDefault();
            bumpFindFont(ev.deltaY < 0 ? 1 : -1);
        }, { passive: false });

        // Close the history popups + tab context-menu on any click outside them.
        document.addEventListener('click', function (ev) {
            if (!ev.target.closest || !ev.target.closest('.combo')) { hideHist('findHist'); hideHist('replHist'); }
            if (!ev.target.closest || !ev.target.closest('#ftabMenu')) hideTabMenu();
        });
    }

    // ----- Messages from C# host -----
    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.addEventListener('message', function (e) {
            // PostWebMessageAsJson delivers e.data as an already-parsed object;
            // only JSON.parse when it arrives as a string (matches diff.html).
            var msg = e.data;
            if (typeof msg === 'string') {
                try { msg = JSON.parse(msg); } catch (ex) { return; }
            }
            if (msg.type === 'setSource') {
                if (ready) applySource(msg); else pending = msg;
            } else if (msg.type === 'applyTheme') {
                setTheme(themePrefDark);   // user preference wins over IDE theme changes
            } else if (msg.type === 'saveResult') {
                if (saveSafetyTimer) { clearTimeout(saveSafetyTimer); saveSafetyTimer = null; }
                showToast(msg.message, msg.ok);
            } else if (msg.type === 'response' && msg.reqId != null) {
                var resolver = pendingRequests[msg.reqId];
                if (resolver) { delete pendingRequests[msg.reqId]; resolver(msg.data); }
            } else if (msg.type === 'insertText') {
                insertTextAtCursor(msg.text);
            } else if (msg.type === 'gotoRoutine') {
                gotoRoutine(msg.name);
            } else if (msg.type === 'applySettings') {
                applyEditorSettings(msg.settings);
                populateSettingsPanel(msg.settings);
            } else if (msg.type === 'applyHistory') {
                if (msg.find) replaceArray(findHistory, msg.find);
                if (msg.replace) replaceArray(replHistory, msg.replace);
                // Solution-wide lists only — this tab keeps its own procedure's recent terms.
                var fh = document.getElementById('findHist');
                if (fh && !fh.classList.contains('hidden')) showFindHist();
                var rh = document.getElementById('replHist');
                if (rh && !rh.classList.contains('hidden')) showReplHist();
            }
        });
    }

    bootMonaco();
</script>
</body>
</html>
